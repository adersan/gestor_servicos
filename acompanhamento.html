<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#164f43">
  <title>Acompanhamento de serviços</title>
  <link rel="stylesheet" href="acompanhamento.css?v=20">
</head>
<body>
  <header class="tracking-header">
    <div><span>Gestor de Serviços</span><h1>Acompanhamento</h1></div>
    <button id="refreshButton" type="button">Atualizar</button>
  </header>
  <main class="tracking-main">
    <section id="loadingPanel" class="tracking-card tracking-message">Carregando serviços...</section>
    <section id="errorPanel" class="tracking-card tracking-message tracking-error hidden"></section>
    <section id="trackingPanel" class="hidden">
      <div class="tracking-intro">
        <div><span class="eyebrow">Consulta somente leitura</span><h2 id="clientName"></h2><p id="periodText"></p></div>
        <div class="updated-box"><span>Atualizado em</span><strong id="updatedAt"></strong></div>
      </div>
      <section id="trackingRequestSection" class="tracking-card tracking-request-card hidden">
        <div class="section-title"><h3>Pedidos</h3><button id="openTrackingRequestDialog" class="tracking-primary" type="button">Novo pedido</button></div>
        <div class="section-title request-history-title"><h3>Pedidos enviados</h3></div>
        <div id="trackingRequestHistory" class="tracking-request-history"></div>
      </section>
      <div id="trackingSummary" class="tracking-summary"></div>
      <section class="tracking-dashboard">
        <article class="tracking-card tracking-chart-card">
          <div class="section-title"><h3>Resumo por status</h3></div>
          <div id="statusChart" class="tracking-status-chart"></div>
        </article>
        <article class="tracking-card tracking-chart-card">
          <div class="section-title"><h3>Serviços mais pedidos</h3></div>
          <div id="serviceChart" class="tracking-bar-chart"></div>
        </article>
      </section>
      <section class="tracking-card">
        <div class="section-title"><h3>Serviços do período</h3><span id="serviceCount"></span></div>
        <div class="tracking-search">
          <input id="trackingServiceSearch" type="search" placeholder="Buscar placa, servico, status ou solicitante">
          <select id="trackingRequesterFilter" aria-label="Filtrar por solicitante"></select>
          <select id="trackingServiceSort" aria-label="Ordenar servicos">
            <option value="date">Data</option>
            <option value="requester">Solicitante</option>
            <option value="status">Status</option>
            <option value="service">Servico</option>
          </select>
        </div>
        <div id="serviceList" class="tracking-list"></div>
      </section>
      <p id="expiryText" class="tracking-expiry"></p>
    </section>
  </main>
  <dialog id="trackingRequestDialog">
    <form id="trackingRequestForm" class="tracking-request-form" method="dialog">
      <div class="tracking-dialog-heading"><h2>Novo pedido</h2><button class="tracking-close-button" type="button" data-close-tracking-request aria-label="Fechar">×</button></div>
      <p class="tracking-dialog-note">Envie placas ou referências para o administrador.</p>
      <label>Data<input name="requestedDate" type="date" readonly></label>
      <input name="serviceId" type="hidden">
      <label>Serviço<input name="serviceSearch" type="search" list="trackingRequestServiceOptions" autocomplete="off" required placeholder="Digite o código ou nome"></label>
      <datalist id="trackingRequestServiceOptions"></datalist>
      <label>Valor<input name="amount" type="text" readonly></label>
      <label>Placa/referência<textarea name="references" rows="4" required placeholder="Uma por linha. Ex.:&#10;ABC1D23&#10;DEF4G56"></textarea></label>
      <label>Quem solicitou
        <span class="tracking-requester-row">
          <input name="requestedBy" list="trackingRequesterOptions" placeholder="Nome do solicitante">
          <button class="tracking-secondary" type="button" data-add-tracking-requester>+</button>
        </span>
      </label>
      <datalist id="trackingRequesterOptions"></datalist>
      <label>Observação<textarea name="notes" rows="3" placeholder="Detalhes importantes"></textarea></label>
      <p id="trackingRequestMessage" class="tracking-form-message"></p>
      <div class="tracking-request-actions">
        <button class="tracking-secondary" type="button" data-close-tracking-request>Cancelar</button>
        <button class="tracking-primary" value="default">Salvar pedido</button>
      </div>
    </form>
  </dialog>
  <script src="acompanhamento.js?v=21"></script>
</body>
</html>
