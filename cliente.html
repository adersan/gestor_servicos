<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#164f43">
  <title>Área do cliente | Gestor de Serviços</title>
  <link rel="stylesheet" href="styles.css?v=32">
  <link rel="stylesheet" href="cliente.css?v=21">
</head>
<body class="client-portal">
  <header class="client-header">
    <div class="client-brand-lockup">
      <img src="logo.svg" alt="" aria-hidden="true">
      <div>
        <span class="eyebrow">Gestor de Serviços</span>
        <h1>Área do cliente</h1>
      </div>
    </div>
    <button id="logoutButton" class="secondary hidden" type="button">Sair</button>
  </header>

  <main class="client-main">
    <section id="loginPanel" class="client-login card">
      <span class="eyebrow">Acesso temporário</span>
      <h2>Consulte sua cobrança</h2>
      <p class="meta">Use o identificador e a senha recebidos junto com a cobrança.</p>
      <form id="clientLoginForm">
        <label>Identificador<input name="identifier" autocomplete="username" required placeholder="GS-00000000"></label>
        <label>Senha<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="primary full" type="submit">Entrar</button>
        <p id="loginError" class="form-error" role="alert"></p>
      </form>
    </section>

    <section id="statementPanel" class="hidden">
      <div class="client-toolbar">
        <div>
          <span class="eyebrow">Relatório de cobrança</span>
          <h2 id="clientName"></h2>
          <p id="billingPeriod" class="meta"></p>
        </div>
        <div class="client-toolbar-actions">
          <button id="refreshClientButton" class="secondary" type="button">Atualizar</button>
          <button id="printButton" class="primary" type="button">Abrir PDF</button>
        </div>
      </div>
      <nav id="clientPortalNav" class="client-portal-nav" aria-label="Opções da área do cliente">
        <button class="active" type="button" data-client-view="billing">Cobrança</button>
        <button type="button" data-client-view="current-services">Consumo atual</button>
        <button id="historyTab" class="hidden" type="button" data-client-view="history">Histórico</button>
      </nav>
      <div id="statementContent"></div>
    </section>
  </main>

  <script src="cliente.js?v=21"></script>
</body>
</html>
